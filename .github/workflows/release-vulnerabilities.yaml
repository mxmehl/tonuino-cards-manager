name: Vulnerability Check of Latest Release/Tag

on:
  workflow_dispatch: # allow to trigger manually
  schedule:
    - cron: "35 9 * * 1" # run a check once a week

jobs:
  osv-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.repository_owner == 'mxmehl'
    steps:
      - uses: mxmehl/latest-release-vulnerability-status@7bf640f27843fc38504540bb20401c13d2d2019b # v1.2.2
